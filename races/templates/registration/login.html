<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Вход</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: #1e293b;
            border-radius: 15px;
            box-shadow: 0 0 20px #22c55e;
        }

        h1 {
            color: #22c55e;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #22c55e;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #16a34a;
        }

        .error {
            color: red;
        }
        .register-btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: #3b82f6;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.register-btn:hover {
    background: #2563eb;
    transform: scale(1.05);
}
    </style>
</head>
<body>

<div class="container">
    <h1>🐎 Вход в игру</h1>

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Логин"><br>
        <input type="password" name="password" placeholder="Пароль"><br>


        <button type="submit">🎮 ВОЙТИ</button>
    </form>

    <a href="{% url 'register' %}" class="register-btn">
        📝 Регистрация
    </a>
    {% if form.errors %}
    <p class="error">Неверный логин или пароль</p>
    {% endif %}
</div>

</body>
</html>
