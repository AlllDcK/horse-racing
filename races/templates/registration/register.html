<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: #1e293b;
            border-radius: 15px;
            box-shadow: 0 0 20px #22c55e;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #22c55e;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
        }

        a {
            color: #22c55e;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🐎 Регистрация</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Создать аккаунт</button>
    </form>

    <p><a href="{% url 'login' %}">Уже есть аккаунт?</a></p>
</div>

</body>
</html>
